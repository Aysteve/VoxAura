
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxAura - Professional Speech Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              studio: {
                cream: '#FFFDF1',
                peach: '#FFCE99',
                orange: '#FF9644',
                brown: '#562F00',
              }
            },
            animation: {
              'bounce-short': 'bounceShort 1s ease-in-out infinite',
              'music-bar-1': 'musicBar 0.8s ease-in-out infinite',
              'music-bar-2': 'musicBar 0.5s ease-in-out infinite',
              'music-bar-3': 'musicBar 0.7s ease-in-out infinite',
            },
            keyframes: {
              bounceShort: {
                '0%, 100%': { transform: 'translateY(-5%)' },
                '50%': { transform: 'translateY(0)' },
              },
              musicBar: {
                '0%, 100%': { height: '10%' },
                '50%': { height: '100%' },
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --studio-cream: #FFFDF1;
            --studio-peach: #FFCE99;
            --studio-orange: #FF9644;
            --studio-brown: #562F00;
        }
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background-color: var(--studio-cream); 
          color: var(--studio-brown); 
          margin: 0;
          overflow-x: hidden;
          -webkit-tap-highlight-color: transparent;
        }
        .text-gradient {
          background: linear-gradient(135deg, var(--studio-brown), var(--studio-orange));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--studio-cream); }
        ::-webkit-scrollbar-thumb { background: var(--studio-peach); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--studio-orange); }

        input[type="range"] {
          appearance: none;
          background: var(--studio-peach);
          height: 3px;
          border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
          appearance: none;
          height: 14px;
          width: 14px;
          border-radius: 50%;
          background: var(--studio-brown);
          border: 2px solid var(--studio-cream);
          box-shadow: 0 4px 10px rgba(86, 47, 0, 0.15);
          cursor: pointer;
        }

        .studio-card {
          background: white;
          border: 1px solid var(--studio-peach);
          box-shadow: 0 2px 10px rgba(86, 47, 0, 0.02);
          transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .studio-card:hover {
          box-shadow: 0 12px 24px rgba(86, 47, 0, 0.08);
          border-color: var(--studio-orange);
          transform: translateY(-2px);
        }

        .sidebar-unfold {
          transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeIn {
          from { opacity: 0; transform: translateX(-10px); }
          to { opacity: 1; transform: translateX(0); }
        }
        .animate-label { animation: fadeIn 0.2s ease-out forwards; }

        .waveform-art {
          background: linear-gradient(135deg, #FF964410, #562F0010);
          mask-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 50 Q 25 20 40 50 T 70 50 T 100 50' fill='none' stroke='black' stroke-width='2'/%3E%3C/svg%3E");
        }

        .pro-shadow {
           box-shadow: 0 8px 32px rgba(86, 47, 0, 0.04);
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
